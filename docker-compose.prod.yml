services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: ${ENV_FILE:-.env.production}
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    expose:
      - "5000"
    volumes:
      - app-storage:/app/server/storage
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: ${ENV_FILE:-.env.production}
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c 'mkdir -p /backups;
      while true; do
        ts=$$(date +%Y%m%d-%H%M%S);
        pg_dump -h db -U "$$POSTGRES_USER" "$$POSTGRES_DB" | gzip > "/backups/sahabatcerdikdm-$$ts.sql.gz";
        find /backups -type f -name "*.sql.gz" -mtime +14 -delete;
        sleep 86400;
      done'
    volumes:
      - postgres-backups:/backups

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  postgres-backups:
  app-storage:
  caddy-data:
  caddy-config:
