services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sahabat_cerdik_dm}
      POSTGRES_USER: ${POSTGRES_USER:-sahabat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sahabat_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahabat -d sahabat_cerdik_dm"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgres://${POSTGRES_USER:-sahabat}:${POSTGRES_PASSWORD:-sahabat_dev_password}@db:5432/${POSTGRES_DB:-sahabat_cerdik_dm}
      AUTH_SECRET: ${AUTH_SECRET:-dev-docker-sahabat-cerdik-dm-secret}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-24}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-60}
      EMAIL_VERIFICATION_TTL_HOURS: ${EMAIL_VERIFICATION_TTL_HOURS:-24}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5000,http://localhost:5173}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      MAIL_FROM: ${MAIL_FROM:-}
      REMINDER_TIMEZONE: ${REMINDER_TIMEZONE:-Asia/Jakarta}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-mock}
      WHATSAPP_SESSION_NAME: ${WHATSAPP_SESSION_NAME:-sahabat-cerdik-dm}
      WHATSAPP_AUTH_DIR: ${WHATSAPP_AUTH_DIR:-storage/whatsapp-session}
    ports:
      - "5000:5000"
    volumes:
      - app-storage:/app/server/storage

volumes:
  postgres-data:
  app-storage:
