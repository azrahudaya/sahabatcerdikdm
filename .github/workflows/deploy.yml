name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check app
        run: |
          npm ci
          npm test
          npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Pack release
        run: |
          printf '%s' "${{ secrets.PRODUCTION_ENV }}" > .env.production
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='client/dist' \
            --exclude='server/storage' \
            --exclude='storage' \
            --exclude='coverage' \
            --exclude='.env' \
            -czf release.tgz .

      - name: Upload release
        run: |
          scp -i ~/.ssh/deploy_key release.tgz "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/sahabatcerdikdm-release.tgz"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail
          APP_DIR=/opt/sahabatcerdikdm
          sudo mkdir -p "$APP_DIR"
          sudo chown "$USER:$USER" "$APP_DIR"
          rm -rf "$APP_DIR/source"
          mkdir -p "$APP_DIR/source"
          tar -xzf /tmp/sahabatcerdikdm-release.tgz -C "$APP_DIR/source"
          rm -f /tmp/sahabatcerdikdm-release.tgz
          cd "$APP_DIR/source"
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
          docker compose --env-file .env.production -f docker-compose.prod.yml ps
          docker image prune -f
          EOF
